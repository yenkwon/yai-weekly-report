name: weekly-balance-report
on:
  schedule:
    - cron: '0 9 * * 0'     # Sun 18:00 KST  → send report + ask for corrections
    - cron: '0 23 * * 0'    # Mon 08:00 KST  → resend if corrections or sleep reply exist
  workflow_dispatch:
    inputs:
      mode: { description: 'send | reconcile', required: true, default: 'send' }

permissions:
  contents: write           # to commit history.json + docs/ for Pages

concurrency:
  group: weekly-balance-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Sync latest branch state
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"
      - name: Validate worklife token
        env:
          WORKLIFE_REPO_TOKEN: ${{ secrets.WORKLIFE_REPO_TOKEN }}
        run: |
          if [ -z "${WORKLIFE_REPO_TOKEN}" ]; then
            echo "::error title=Missing secret::WORKLIFE_REPO_TOKEN is required to read yai-worklife-agent self reports."
            exit 1
          fi
      - name: Checkout worklife self reports
        uses: actions/checkout@v7
        with:
          repository: yenkwon/yai-worklife-agent
          path: worklife-agent
          token: ${{ secrets.WORKLIFE_REPO_TOKEN }}
          sparse-checkout: |
            store/self-reports.json
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - name: Show runtime
        run: |
          echo "commit=${GITHUB_SHA}"
          node --version
          npm --version
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Pick mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 9 * * 0" ]; then echo "m=send" >> $GITHUB_OUTPUT; else echo "m=reconcile" >> $GITHUB_OUTPUT; fi
          else echo "m=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT; fi
      - name: Validate required secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKLIFE_REPO_TOKEN: ${{ secrets.WORKLIFE_REPO_TOKEN }}
        run: |
          missing=0
          for name in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REFRESH_TOKEN TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID WORKLIFE_REPO_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set in repository Actions secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Run
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SELF_REPORT_SOURCE: telegram
          WORKLIFE_SELF_REPORTS_PATH: worklife-agent/store/self-reports.json
          PUBLISH_DIR: docs
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: node src/index.js ${{ steps.mode.outputs.m }}
      - name: Commit history + dashboard
        run: |
          git config user.name "balance-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/history.json data/last-msg.json docs
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "report ${{ steps.mode.outputs.m }} $(date -u +%F)"
            git push
          fi
